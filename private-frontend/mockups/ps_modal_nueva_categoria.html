<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nueva categoría — Modal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:        #0c1f3d;
  --navy-light:  #1a3256;
  --teal:        #0e7490;
  --teal-hover:  #0c6478;
  --teal-bg:     #ecfeff;
  --teal-tag:    #cffafe;
  --white:       #ffffff;
  --gray-50:     #f8fafc;
  --gray-100:    #f1f5f9;
  --gray-200:    #e2e8f0;
  --gray-300:    #cbd5e1;
  --gray-400:    #94a3b8;
  --gray-500:    #64748b;
  --gray-700:    #334155;
  --gray-900:    #0f172a;
  --radius-sm:   6px;
  --radius-md:   10px;
  --radius-lg:   16px;
  --font-main:   'Inter', system-ui, sans-serif;
  --font-head:   'Sora', system-ui, sans-serif;
}

body {
  font-family: var(--font-main);
  min-height: 100vh;
  /* fondo de muestra para apreciar el modal sobre la app */
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(14,116,144,0.10), transparent),
    var(--gray-100);
}

/* ── BACKDROP ── */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(8, 22, 44, 0.6);
  backdrop-filter: blur(5px);
  -webkit-backdrop-filter: blur(5px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  animation: backdropIn 0.22s ease;
}
@keyframes backdropIn { from { opacity: 0; } to { opacity: 1; } }

/* ── MODAL ── */
.modal {
  position: relative;
  background: var(--white);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 480px;
  box-shadow:
    0 1px 0 rgba(255,255,255,0.6) inset,
    0 32px 64px -16px rgba(8, 22, 44, 0.45),
    0 0 0 1px rgba(8, 22, 44, 0.04);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  max-height: calc(100vh - 32px);
  animation: modalIn 0.34s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(14px) scale(0.96); }
  to   { opacity: 1; transform: none; }
}

/* Acento superior degradado */
.modal::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--teal), #38bdf8, var(--navy));
}

/* ── HEADER ── */
.modal-header {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 24px 24px 18px;
}

.modal-icon {
  width: 46px;
  height: 46px;
  border-radius: 13px;
  background: linear-gradient(140deg, var(--teal) 0%, var(--navy) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--white);
  flex-shrink: 0;
  box-shadow: 0 8px 18px -4px rgba(14, 116, 144, 0.5);
}

.modal-header-text { flex: 1; min-width: 0; padding-top: 2px; }
.modal-header-text h2 {
  font-family: var(--font-head);
  font-size: 19px;
  font-weight: 700;
  color: var(--gray-900);
  line-height: 1.25;
  margin-bottom: 3px;
  letter-spacing: -0.01em;
}
.modal-header-text p {
  font-size: 13px;
  color: var(--gray-400);
  line-height: 1.45;
}

.modal-close {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  border: none;
  background: none;
  color: var(--gray-400);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin: -4px -6px 0 0;
  transition: background 0.12s, color 0.12s, transform 0.12s;
}
.modal-close:hover { background: var(--gray-100); color: var(--gray-700); transform: rotate(90deg); }

/* ── BODY / FORM ── */
.modal-body { padding: 4px 24px 22px; overflow-y: auto; }

.field { display: flex; flex-direction: column; gap: 7px; }
.field + .field { margin-top: 18px; }

.field-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--gray-700);
  display: flex;
  align-items: center;
  gap: 6px;
  transition: color 0.15s;
}
.field:focus-within .field-label { color: var(--teal); }

.required-dot {
  width: 5px; height: 5px;
  background: var(--teal);
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
}
.optional-label { font-size: 11px; font-weight: 400; color: var(--gray-400); }

/* Input con ícono guía */
.input-wrap { position: relative; display: flex; align-items: center; }
.input-wrap.is-textarea { align-items: flex-start; }

.input-icon {
  position: absolute;
  left: 13px;
  color: var(--gray-300);
  pointer-events: none;
  transition: color 0.15s;
  display: flex;
}
.input-wrap.is-textarea .input-icon { top: 13px; }
.input-wrap:focus-within .input-icon { color: var(--teal); }

.input-wrap input,
.input-wrap textarea {
  font-family: var(--font-main);
  font-size: 14px;
  color: var(--gray-900);
  background: var(--gray-50);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
  padding: 11px 13px 11px 40px;
  outline: none;
  width: 100%;
  transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
}
.input-wrap input::placeholder,
.input-wrap textarea::placeholder { color: var(--gray-300); }

.input-wrap input:focus,
.input-wrap textarea:focus {
  border-color: var(--teal);
  background: var(--white);
  box-shadow: 0 0 0 4px rgba(14, 116, 144, 0.12);
}

.input-wrap textarea {
  resize: vertical;
  min-height: 96px;
  line-height: 1.6;
}

.field-helper {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  font-size: 12px;
  color: var(--gray-400);
}
.field-helper .hint { display: inline-flex; align-items: center; gap: 5px; }
.field-helper .hint svg { color: var(--gray-300); flex-shrink: 0; }
.char-count { font-variant-numeric: tabular-nums; flex-shrink: 0; }

/* ── FOOTER ── */
.modal-footer {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 10px;
  padding: 16px 24px;
  border-top: 1px solid var(--gray-100);
  background: var(--gray-50);
}

.btn-secondary {
  height: 42px;
  padding: 0 20px;
  background: var(--white);
  color: var(--gray-700);
  font-size: 14px;
  font-weight: 500;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
  cursor: pointer;
  font-family: var(--font-main);
  transition: background 0.15s, border-color 0.15s;
}
.btn-secondary:hover { background: var(--gray-50); border-color: var(--gray-300); }

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  height: 42px;
  padding: 0 22px;
  background: var(--teal);
  color: var(--white);
  font-size: 14px;
  font-weight: 600;
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  font-family: var(--font-main);
  box-shadow: 0 6px 16px -4px rgba(14, 116, 144, 0.5);
  transition: background 0.15s, box-shadow 0.15s, transform 0.12s;
}
.btn-primary:hover {
  background: var(--teal-hover);
  box-shadow: 0 8px 20px -4px rgba(14, 116, 144, 0.6);
  transform: translateY(-1px);
}
.btn-primary:active { transform: translateY(0); }

/* ── MOBILE ── */
@media (max-width: 540px) {
  .modal-footer { flex-direction: column-reverse; align-items: stretch; }
  .modal-footer .btn-secondary,
  .modal-footer .btn-primary { width: 100%; justify-content: center; }
}
</style>
</head>
<body>

<div class="modal-backdrop">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">

    <!-- HEADER -->
    <div class="modal-header">
      <div class="modal-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/>
          <line x1="7" y1="7" x2="7.01" y2="7"/>
        </svg>
      </div>
      <div class="modal-header-text">
        <h2 id="modalTitle">Nueva categoría</h2>
        <p>Creá una categoría para organizar el catálogo</p>
      </div>
      <button class="modal-close" aria-label="Cerrar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <!-- BODY / FORM -->
    <div class="modal-body">

      <!-- NOMBRE (obligatorio, único en la DB) -->
      <div class="field">
        <label class="field-label" for="catNombre">
          Nombre
          <span class="required-dot" title="Obligatorio"></span>
        </label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
          </span>
          <input type="text" id="catNombre" placeholder="Ej. Cámaras frigoríficas" autocomplete="off">
        </div>
        <div class="field-helper">
          <span class="hint">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            El nombre debe ser único.
          </span>
        </div>
      </div>

      <!-- DESCRIPCION (opcional) -->
      <div class="field">
        <label class="field-label" for="catDesc">
          Descripción
          <span class="optional-label">(opcional)</span>
        </label>
        <div class="input-wrap is-textarea">
          <span class="input-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="14" y2="17"/></svg>
          </span>
          <textarea id="catDesc" maxlength="1000" placeholder="Breve descripción de la categoría y qué tipo de productos agrupa." oninput="actualizarConteo()"></textarea>
        </div>
        <div class="field-helper">
          <span></span>
          <span class="char-count"><span id="charNow">0</span>/1000</span>
        </div>
      </div>

    </div>

    <!-- FOOTER -->
    <div class="modal-footer">
      <button class="btn-secondary">Cancelar</button>
      <button class="btn-primary">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><polyline points="20 6 9 17 4 12"/></svg>
        Crear categoría
      </button>
    </div>

  </div>
</div>

<script>
  /* Contador de caracteres de la descripción (presentacional, refleja el límite VARCHAR(1000) del campo DSC) */
  function actualizarConteo() {
    document.getElementById('charNow').textContent = document.getElementById('catDesc').value.length;
  }
</script>

</body>
</html>
